version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "daily"
    ignore:
      # Pinned to Vue 2.x - upgrading to Vue 3 requires a full application rewrite.
      # versions condition applies to both version updates AND security updates,
      # unlike update-types which only applies to version updates.
      - dependency-name: "vue"
        versions: [">=3.0.0"]
      - dependency-name: "vue-router"
        versions: [">=4.0.0"]
      - dependency-name: "vuex"
        versions: [">=5.0.0"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    versioning-strategy: increase
    target-branch: dev
  - package-ecosystem: "npm"
    directory: "/electron"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"
        update-types: [ "version-update:semver-major" ]
    versioning-strategy: increase
    target-branch: dev
  - package-ecosystem: "pip"
    directory: "/server"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    versioning-strategy: increase
    target-branch: dev
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    target-branch: dev
  - package-ecosystem: "github-actions"
    directory: "/.github"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    target-branch: dev
